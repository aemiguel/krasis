name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:  # Manual trigger for testing builds

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist -i python3.10 python3.11 python3.12 python3.13
          manylinux: "2_28"
          before-script-linux: |
            # numactl for libnuma
            yum install -y numactl-devel 2>/dev/null || dnf install -y numactl-devel 2>/dev/null || apt-get install -y libnuma-dev 2>/dev/null || true
            # CUDA toolkit for nvcc (decode kernels compiled to PTX at build time)
            # and libcuda.so stubs (FLA sidecars link against the CUDA driver API,
            # but release CI has no real GPU driver installed).
            # build.rs checks /usr/local/cuda-12.6/bin/nvcc directly
            if [ ! -f /usr/local/cuda-12.6/bin/nvcc ]; then
              yum install -y yum-utils 2>/dev/null || true
              yum-config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo 2>/dev/null || \
                dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo 2>/dev/null || true
              yum install -y --nogpgcheck cuda-nvcc-12-6 cuda-cudart-devel-12-6 cuda-driver-devel-12-6 2>/dev/null || \
                dnf install -y --nogpgcheck cuda-nvcc-12-6 cuda-cudart-devel-12-6 cuda-driver-devel-12-6 2>/dev/null || true
              ls -la /usr/local/cuda-12.6/bin/nvcc 2>/dev/null && echo "nvcc installed OK" || echo "WARNING: nvcc install failed"
            fi
            if [ ! -f /usr/local/cuda-12.6/targets/x86_64-linux/lib/stubs/libcuda.so ] && \
               [ ! -f /usr/local/cuda-12.6/lib64/stubs/libcuda.so ]; then
              yum install -y --nogpgcheck cuda-driver-devel-12-6 2>/dev/null || \
                dnf install -y --nogpgcheck cuda-driver-devel-12-6 2>/dev/null || true
            fi
            find /usr/local/cuda-12.6 -path '*/stubs/libcuda.so' -print -quit | grep -q . || {
              echo "ERROR: CUDA driver stub libcuda.so not found under /usr/local/cuda-12.6" >&2
              find /usr/local/cuda-12.6 -maxdepth 5 -name 'libcuda.so*' -print 2>/dev/null || true
              exit 1
            }
            # FLA kernel cross-compilation (no GPU needed — uses Triton cross-compile)
            # CPU-only torch keeps download small (~200MB vs ~2.7GB for CUDA torch).
            # FLA source files import torch at module level but compilation only uses Triton.
            /opt/python/cp312-cp312/bin/pip install 'triton>=3.5.1,<3.6'
            /opt/python/cp312-cp312/bin/pip install torch --index-url https://download.pytorch.org/whl/cpu
            PATH="/usr/local/cuda-12.6/bin:$PATH" KRASIS_DEV_SCRIPT=1 KRASIS_FLA_CROSS_COMPILE=1 KRASIS_FLA_REQUIRE_ALL_ARCHS=1 \
              /opt/python/cp312-cp312/bin/python src/cuda/fla/compile_kernels.py \
              --output-dir /tmp/fla_build --arch 80 89 90 120
            mkdir -p python/krasis
            cp /tmp/fla_build/libkrasis_fla_sm*.so python/krasis/
            ls -la python/krasis/libkrasis_fla_sm*.so
            # build.rs generates Marlin and FlashAttention sidecars late in
            # the cargo build, after maturin has already collected Python
            # package data. Prebuild once here so they are present before
            # maturin packages each wheel.
            PATH="/usr/local/cuda-12.6/bin:$PATH" cargo build --release --features pyo3/extension-module,cuda
            ls -la python/krasis/libkrasis_marlin.so python/krasis/libkrasis_flash_attn.so

      - name: Inject vendored sidecars into wheels
        run: |
          python3 <<'PY'
          from pathlib import Path
          import subprocess
          import zipfile

          wheel_dir = Path("dist")
          wheels = sorted(wheel_dir.glob("*.whl"))
          if not wheels:
              raise SystemExit("no wheels found in dist")

          required = {
              "krasis/libkrasis_marlin.so",
              "krasis/libkrasis_flash_attn.so",
          }
          # FLA .so files are expected for each target architecture. Release
          # prebuild requires all of these, so missing entries indicate a
          # packaging problem rather than an optional downgrade.
          fla_archs = [80, 89, 90, 120]
          for arch in fla_archs:
              required.add(f"krasis/libkrasis_fla_sm{arch}.so")

          missing = []
          for wheel in wheels:
              with zipfile.ZipFile(wheel) as zf:
                  names = set(zf.namelist())
              absent = sorted(required - names)
              if absent:
                  print(f"{wheel.name}: missing {', '.join(absent)}")
                  missing.append(wheel)
              else:
                  print(f"{wheel.name}: vendored sidecars already present")

          if not missing:
              print("All wheels already contain vendored sidecars; skipping injection.")
              raise SystemExit(0)

          def find_sidecar(name: str) -> Path | None:
              for path in Path(".").rglob(name):
                  path_str = path.as_posix()
                  if path_str.startswith("dist/") or "/dist/" in path_str:
                      continue
                  return path
              return None

          marlin = find_sidecar("libkrasis_marlin.so")
          flash_attn = find_sidecar("libkrasis_flash_attn.so")
          if marlin is None or flash_attn is None:
              missing_names = []
              if marlin is None:
                  missing_names.append("libkrasis_marlin.so")
              if flash_attn is None:
                  missing_names.append("libkrasis_flash_attn.so")
              raise SystemExit(
                  "wheel sidecars missing and local copies not found: "
                  + ", ".join(missing_names)
              )

          # Find FLA .so directory (required — FLA must be compiled in before-script-linux)
          fla_so = find_sidecar("libkrasis_fla_sm80.so")
          if fla_so is None:
              raise SystemExit(
                  "FLA .so files not found — FLA compilation in before-script-linux failed"
              )
          fla_dir = str(fla_so.parent)

          cmd = [
              "python3",
              "scripts/inject_wheel_sidecars.py",
              "--wheel-dir",
              str(wheel_dir),
              "--marlin",
              str(marlin),
              "--flash-attn",
              str(flash_attn),
              "--fla-dir",
              fla_dir,
          ]

          subprocess.run(cmd, check=True)
          PY

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber

      - name: Upload artifacts (CI debugging)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
